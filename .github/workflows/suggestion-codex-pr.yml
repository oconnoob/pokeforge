name: Suggestion Codex PR

on:
  repository_dispatch:
    types: [codex_suggestion]

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-suggestion-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --no-save @openai/codex-sdk

      - name: Configure git identity
        run: |
          git config user.name "pokeforge-codex-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Run Codex automation
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          CODEX_MODEL: ${{ secrets.CODEX_MODEL }}
          SUGGESTION_ID: ${{ github.event.client_payload.suggestion_id }}
          SUGGESTION_MESSAGE: ${{ github.event.client_payload.suggestion_message }}
        run: node scripts/suggestions/run-codex-suggestion.mjs

      - name: Run unit tests (best effort)
        id: tests
        continue-on-error: true
        run: npm -w apps/web run test:unit

      - name: Build PR body
        run: |
          {
            echo "Automated Codex suggestion implementation."
            echo ""
            echo "### Suggestion Metadata"
            echo "- Suggestion ID: \`${{ github.event.client_payload.suggestion_id }}\`"
            echo "- Submitted By User ID: \`${{ github.event.client_payload.user_id }}\`"
            echo "- Submitted At: \`${{ github.event.client_payload.submitted_at }}\`"
            echo "- Unit Test Step Outcome: \`${{ steps.tests.outcome }}\`"
            echo ""
            echo "### User Suggestion"
            echo "> ${{ github.event.client_payload.suggestion_message }}"
            echo ""
            echo "### Codex Summary"
            if [ -f .codex-suggestion-summary.md ]; then
              cat .codex-suggestion-summary.md
            else
              echo "_No summary file generated._"
            fi
          } > /tmp/pr-body.md

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/suggestion-${{ github.event.client_payload.suggestion_id }}
          base: ${{ github.event.client_payload.base_branch || 'main' }}
          title: "Suggestion #${{ github.event.client_payload.suggestion_id }}: Codex-proposed changes"
          body-path: /tmp/pr-body.md
          commit-message: "feat(suggestions): address user suggestion #${{ github.event.client_payload.suggestion_id }}"
          labels: |
            codex
            suggestion
            automated-pr

      - name: Report suggestion status callback
        if: always()
        env:
          SUGGESTION_ID: ${{ github.event.client_payload.suggestion_id }}
          CALLBACK_BASE_URL: ${{ secrets.SUGGESTION_STATUS_CALLBACK_BASE_URL }}
          CALLBACK_SECRET: ${{ secrets.SUGGESTION_STATUS_WEBHOOK_SECRET }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          BRANCH_NAME: codex/suggestion-${{ github.event.client_payload.suggestion_id }}
          CREATE_PR_OUTCOME: ${{ steps.create_pr.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SUGGESTION_ID" ]; then
            echo "Missing suggestion id in dispatch payload. Skipping callback."
            exit 0
          fi

          if [ -z "$CALLBACK_BASE_URL" ] || [ -z "$CALLBACK_SECRET" ]; then
            echo "Callback secrets are not configured. Skipping callback."
            exit 0
          fi

          node <<'NODE'
          const fs = require("node:fs");

          const status = process.env.CREATE_PR_OUTCOME === "success" && process.env.PR_URL ? "pr_opened" : "failed";
          const payload = {
            status,
            githubRunUrl: process.env.RUN_URL
          };

          if (process.env.BRANCH_NAME) {
            payload.githubBranch = process.env.BRANCH_NAME;
          }

          if (status === "pr_opened") {
            payload.githubPrUrl = process.env.PR_URL;
          } else {
            payload.errorMessage = "Codex suggestion workflow failed before opening a PR.";
          }

          fs.writeFileSync("/tmp/suggestion-status.json", JSON.stringify(payload), "utf8");
          NODE

          CALLBACK_URL="${CALLBACK_BASE_URL%/}/api/suggestions/${SUGGESTION_ID}/status"
          curl --fail --show-error --silent \
            -X POST "$CALLBACK_URL" \
            -H "content-type: application/json" \
            -H "x-suggestion-webhook-secret: $CALLBACK_SECRET" \
            --data-binary @/tmp/suggestion-status.json
